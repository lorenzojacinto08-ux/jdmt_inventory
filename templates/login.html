<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JDMT Inventory System</title>

<style>

:root{
--bg1:#eef2f7;
--bg2:#dfe7f3;

--white:#ffffff;
--text:#0f172a;
--muted:#6b7280;

--primary:#2563eb;
--primary-hover:#1e40af;

--line:#e5e7eb;

--radius-xl:30px;
--radius-lg:22px;
--radius-md:16px;

--shadow:0 20px 50px rgba(15,23,42,0.15);
}

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:"SF Pro Display","Helvetica Neue",Arial,sans-serif;

background:
radial-gradient(circle at 20% 20%, #ffffff 0%, transparent 40%),
radial-gradient(circle at 80% 80%, #dbeafe 0%, transparent 40%),
linear-gradient(120deg,var(--bg1),var(--bg2));

min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.page{
width:100%;
max-width:480px;
padding:20px;
}

.login-card{

background:rgba(255,255,255,0.75);
backdrop-filter:blur(14px);
-webkit-backdrop-filter:blur(14px);

border-radius:var(--radius-xl);

border:1px solid rgba(255,255,255,0.6);

box-shadow:var(--shadow);

padding:36px;
}

.window-dots{
display:flex;
gap:8px;
margin-bottom:18px;
}

.dot{
width:12px;
height:12px;
border-radius:50%;
}

.red{background:#1d4ed8;}
.yellow{background:#1d4ed8;}
.green{background:#1d4ed8;}

.login-title{
margin:0;
font-size:30px;
font-weight:800;
color:var(--text);
letter-spacing:-0.02em;
}

.login-subtitle{
margin:6px 0 26px 0;
font-size:14px;
color:var(--muted);
}

.field-group{
margin-bottom:18px;
}

.field-label{
display:block;
margin-bottom:7px;
font-size:13px;
font-weight:700;
color:#374151;
}

.input-wrap{
position:relative;
}

.input{
width:100%;
padding:14px 16px;
border-radius:var(--radius-md);
border:1px solid var(--line);

background:#fff;

font-size:14px;

outline:none;

transition:all .2s ease;
}

.input:focus{
border-color:var(--primary);
box-shadow:0 0 0 3px rgba(37,99,235,0.15);
}

.password-input{
padding-right:70px;
}

.show-btn{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
background:none;
border:none;
font-weight:700;
font-size:13px;
color:var(--primary);
cursor:pointer;
}

.row{
display:flex;
align-items:center;
justify-content:space-between;
margin:10px 0 22px 0;
font-size:14px;
color:#374151;
}

.remember{
display:flex;
gap:8px;
align-items:center;
}

.remember input{
accent-color:var(--primary);
}

.link-btn{
border:none;
background:none;
font-size:14px;
color:var(--primary);
font-weight:600;
cursor:pointer;
}

.signin-btn{

width:100%;
padding:14px;

border-radius:var(--radius-md);
border:none;

background:linear-gradient(135deg,#2563eb,#1e3a8a);

color:white;

font-size:15px;
font-weight:700;

cursor:pointer;

transition:.2s;
}

.signin-btn:hover{
transform:translateY(-1px);
box-shadow:0 10px 20px rgba(37,99,235,0.35);
}



.footer{
margin-top:18px;
text-align:center;
font-size:12px;
color:#2563eb;
font-weight:600;
text-decoration:none;
}

</style>
</head>


<body>

<div class="page">

<div class="login-card">

<div class="window-dots">
<span class="dot red"></span>
<span class="dot yellow"></span>
<span class="dot green"></span>
</div>

<h2 class="login-title">Welcome Back</h2>
<p class="login-subtitle">Sign in to continue to JDMT Inventory</p>

<div class="field-group">
<label class="field-label">Username</label>
<div class="input-wrap">
<input class="input" type="text" placeholder="Enter your username">
</div>
</div>

<div class="field-group">
<label class="field-label">Password</label>
<div class="input-wrap">
<input id="password" class="input password-input" type="password" placeholder="Enter your password">
<button class="show-btn" onclick="togglePassword()">Show</button>
</div>
</div>

<div class="row">
<label class="remember">
<input type="checkbox">
Remember me
</label>

<button class="link-btn">Forgot password?</button>
</div>

<a href="/home">
<button class="signin-btn">
Log In
</button>
</a>

<div class="footer">
Don't have an account? 
<a href="/signin">
Register
</a>
</div>

</div>

</div>


<script>

function togglePassword(){
const password=document.getElementById("password");
const btn=document.querySelector(".show-btn");

if(password.type==="password"){
password.type="text";
btn.textContent="Hide";
}else{
password.type="password";
btn.textContent="Show";
}
}

</script>

</body>
</html>
