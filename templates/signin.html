<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account | JDMT Inventory System</title>

<style>

:root{
--bg1:#eef2f7;
--bg2:#dbeafe;
--text:#0f172a;
--muted:#6b7280;
--primary:#2563eb;
--primary-hover:#1e40af;
--line:#e5e7eb;

--radius-xl:30px;
--radius-md:16px;

--shadow:0 20px 50px rgba(15,23,42,0.15);
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:"SF Pro Display","Helvetica Neue",Arial,sans-serif;

background:
radial-gradient(circle at 20% 20%, #ffffff 0%, transparent 40%),
radial-gradient(circle at 80% 80%, #dbeafe 0%, transparent 40%),
linear-gradient(120deg,var(--bg1),var(--bg2));

min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.page{
width:100%;
max-width:520px;
padding:20px;
}

.card{
background:rgba(255,255,255,0.75);
backdrop-filter:blur(14px);
border-radius:var(--radius-xl);
border:1px solid rgba(255,255,255,0.6);
box-shadow:var(--shadow);
padding:36px;
}

.window-dots{
display:flex;
gap:8px;
margin-bottom:20px;
}

.dot{
width:12px;
height:12px;
border-radius:50%;
}

.red{background:#1d4ed8;}
.yellow{background:#1d4ed8;}
.green{background:#1d4ed8;}

.title{
font-size:30px;
font-weight:800;
margin:0;
color:var(--text);
}

.subtitle{
font-size:14px;
color:var(--muted);
margin:6px 0 26px 0;
}

.field{
margin-bottom:16px;
}

.label{
display:block;
margin-bottom:6px;
font-size:13px;
font-weight:700;
color:#374151;
}

.input{
width:100%;
padding:14px 16px;
border-radius:var(--radius-md);
border:1px solid var(--line);
font-size:14px;
outline:none;
transition:all .2s ease;
}

.input:focus{
border-color:var(--primary);
box-shadow:0 0 0 3px rgba(37,99,235,0.15);
}

.row{
display:flex;
gap:12px;
}

.signup-btn{
width:100%;
margin-top:10px;
padding:14px;
border:none;
border-radius:var(--radius-md);
background:linear-gradient(135deg,#2563eb,#1e3a8a);
color:white;
font-size:15px;
font-weight:700;
cursor:pointer;
transition:.2s;
}

.signup-btn:hover{
transform:translateY(-1px);
box-shadow:0 10px 20px rgba(37,99,235,0.35);
}

.footer{
margin-top:18px;
text-align:center;
font-size:13px;
color:var(--muted);
}

.footer a{
color:var(--primary);
text-decoration:none;
font-weight:600;
}

.footer a:hover{
text-decoration:underline;
}

</style>
</head>

<body>

<div class="page">

<div class="card">

<div class="window-dots">
<span class="dot red"></span>
<span class="dot yellow"></span>
<span class="dot green"></span>
</div>

<h2 class="title">Create Account</h2>
<p class="subtitle">Register to use JDMT Inventory System</p>



<div class="field">
<label class="label">Username</label>
<input class="input" type="text" placeholder="Choose username">
</div>

<div class="field">
<label class="label">Password</label>
<input class="input" type="password" placeholder="Create password">
</div>

<div class="field">
<label class="label">Confirm Password</label>
<input class="input" type="password" placeholder="Confirm password">
</div>

<a href="/">
<button class="signup-btn">
Create Account
</button>
</a>

<div class="footer">
Already have an account?
<a href="/">Sign In</a>
</div>

</div>

</div>

</body>
</html>
